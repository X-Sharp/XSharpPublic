; This file describes the table info for the SQL RDD
[Defaults]
CompareMemo=false
MaxRecords=10
AllowUpdates=true
LongFieldNames=true
TrimTrailingSpaces=true
UpdateAllColumns=false
SeekReturnsSubset=false
MaxRecnoAsRecCount=false
UpdateAllColumns=false
RecnoColumn=xs_recno
DeletedColumn=

[Customers]
; Entries that are not included get their default value from the [Defaults] section]
Name=Customers
ColumnList=*
UpdatableColumns=*
ServerFilter=
Indexes=Customers
KeyColumns=CustomerId


; This is the list of tags for the index Customers
[Index:Customers]
Tags=PK,CompanyName,ContactName,Address,Alfred

; These are logical tags. They do not have to exist as indexes on the server.
; Of course indexes on the server will speed up the searches.
[Tag:Customers:PK]
Expression=CustomerId
Condition=
[Tag:Customers:CompanyName]
Expression=UPPER(CompanyName)
Condition=
[Tag:Customers:ContactName]
Expression=UPPER(ContactName)
Condition=
[Tag:Customers:Address]
Expression=Upper(Country)+Upper(City)
Condition=
[Tag:Customers:Alfred]
Expression=Upper(Country)+Upper(City)
Condition=CompanyName='B'


[Orders]
; Entries that are not included get their default value from the [Defaults] section]
Name=Orders
ColumnList=*
UpdatableColumns=*
ServerFilter=
Indexes=Orders
KeyColumns=OrderId


; This is the list of tags for the index Customers
[Index:Orders]
Tags=ID,CustomerID,ShipCity

; These are logical tags. They do not have to exist as indexes on the server.
; Of course indexes on the server will speed up the searches.
[Tag:Orders:ID]
Expression=OrderId
Condition=
[Tag:Orders:CustomerID]
Expression=UPPER(CustomerID)
Condition=
[Tag:Orders:ShipCity]
Expression=UPPER(ShipCity)
Condition=
